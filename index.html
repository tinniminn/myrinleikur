<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HM 2026 · Veðmál í Mýrinni</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  :root {
    --bg: #EEEEEA;
    --card: #FFFFFF;
    --text: #111111;
    --muted: #666666;
    --border: #DDDDDA;
    --accent1: #C8F0C0;
    --accent2: #C0D8F5;
    --accent3: #E8C8F5;
    --accent4: #F5EAC0;
    --accent5: #F5C8C8;
    --accent6: #C0F0E8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    padding: 16px 50px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    gap: 20px;
    flex-shrink: 0;
  }

  .header-left h1 {
    font-size: clamp(1.8rem, 3vw, 3rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    text-transform: uppercase;
  }

  .header-left .subtitle {
    font-size: clamp(0.75rem, 1.1vw, 1rem);
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .header-right {
    text-align: right;
    flex-shrink: 0;
  }

  .pot-label {
    font-size: clamp(0.65rem, 0.85vw, 0.8rem);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 600;
  }

  .pot-amount {
    font-size: clamp(1.6rem, 2.8vw, 2.8rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .countdown-badge {
    display: inline-block;
    margin-top: 6px;
    background: var(--text);
    color: var(--bg);
    font-size: clamp(0.65rem, 0.9vw, 0.8rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
  }

  /* ── GRID SECTION ── */
  .grid-section {
    padding: 12px 50px 10px;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .section-label {
    font-size: clamp(0.62rem, 0.8vw, 0.75rem);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .participants-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    flex: 1;
    min-height: 0;
    align-content: stretch;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: 4px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--border);
    position: relative; /* Bætt við fyrir staðsetningu á emoji */
  }

  .avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.15rem;
    font-weight: 900;
    text-transform: uppercase;
    color: rgba(0,0,0,0.6);
    overflow: hidden;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }

  .card-info {
    flex: 1;
    min-width: 0;
    padding-right: 14px; /* Gefur pláss svo texti fari ekki yfir emoji */
  }

  .card-name {
    font-size: clamp(0.95rem, 1.15vw, 1.15rem);
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.1;
  }

  .card-countries {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
  }

  .country-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 2px;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .country-flag {
    width: 18px;
    height: auto;
    display: inline-block;
    vertical-align: middle;
    border-radius: 1px;
  }

  /* Nýr stíll fyrir peningapokann */
  .money-bag {
    position: absolute;
    bottom: 6px;
    right: 6px;
    font-size: 18px;
    line-height: 1;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 12px 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 40px;
    flex-shrink: 0;
  }

  .footer-info {
    font-size: clamp(0.75rem, 1vw, 0.9rem);
    color: var(--muted);
  }

  .footer-info strong {
    color: var(--text);
    font-weight: 700;
  }

  .footer-howto {
    font-size: clamp(0.7rem, 0.9vw, 0.85rem);
    color: var(--muted);
    text-align: right;
  }

  /* ── ACCENT COLORS ── */
  .country-tag.ct-0 { background: var(--accent1); }
  .country-tag.ct-1 { background: var(--accent2); }
  .country-tag.ct-2 { background: var(--accent3); }
  .country-tag.ct-3 { background: var(--accent4); }
  .country-tag.ct-4 { background: var(--accent5); }
  .country-tag.ct-5 { background: var(--accent6); }

  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 1rem;
  }
</style>
</head>
<body>

<script>

/* ============================================================
   FÁNALYKILTAFLA — þarft ekki að breyta þessu
   ============================================================ */

  "Argentína":"ar","Brasilía":"br","Frakkland":"fr","Þýskaland":"de",
  "Spánn":"es","Portúgal":"pt","England":"gb-eng","Noregur":"no",

  "Úkraína":"ua","Grikkland":"gr","Slóvakía":"sk","Albanía":"al",

};
</script>

<header>
  <div class="header-left">
    <h1 id="main-title"></h1>
    <div class="subtitle" id="main-subtitle"></div>
  </div>
  <div class="header-right">
    <div class="pot-label">Potturinn stendur í</div>
    <div class="pot-amount" id="pot-display">0 kr.</div>
    <div class="countdown-badge" id="countdown-display"></div>
  </div>
</header>

<div class="grid-section">
  <div class="section-label" id="count-label"></div>
  <div class="participants-grid" id="grid"></div>
</div>

<footer>
  <div class="footer-info">
    <strong>Skyggnigáfa verður umbunuð</strong> í mótslok. Potturinn skiptist milli þeirra sem spá rétt.
  </div>
  <div class="footer-howto" id="footer-note"></div>
</footer>

<script>
const accentColors = ["#C8F0C0","#C0D8F5","#E8C8F5","#F5EAC0","#F5C8C8","#C0F0E8"];

function getFlag(country) {
  const code = flagMap[country];
  if (!code) return `<span style="font-size:0.9rem">🏳</span>`;
  return `<img class="country-flag" src="https://flagcdn.com/w40/${code}.png" alt="${country}">`;
}

function getInitials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join("").slice(0, 2).toUpperCase();
}

function calcPot() {
  return participants.reduce((s, p) => s + (p.countries || []).length * config.betPerCountry, 0);
}

function updateCountdown() {
  const final = new Date(config.finalDate + "T00:00:00");
  const now = new Date();
  const days = Math.ceil((final - now) / (1000 * 60 * 60 * 24));
  const el = document.getElementById("countdown-display");
  if (days > 1)        el.textContent = `Úrslit verða ljós eftir ${days} daga`;
  else if (days === 1) el.textContent = `Úrslit verða ljós á morgun`;
  else if (days === 0) el.textContent = `Úrslit verða ljós Í DAG 🏆`;
  else                 el.textContent = `Mótið er lokið 🏆`;
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (participants.length === 0) {
    grid.innerHTML = `<div class="empty-state">Enginn hefur skráð sig ennþá — vertu fyrstur! 🏆</div>`;
    return;
  }
  participants.forEach((p, i) => {
    const color = accentColors[i % accentColors.length];
    const card = document.createElement("div");
    card.className = "card";

    // Avatar
    const avatarDiv = document.createElement("div");
    avatarDiv.className = "avatar";
    avatarDiv.style.background = color;
    const seed = encodeURIComponent(p.name);
    const bg = color.replace("#", "");
    const avatarSrc = p.avatar || `https://api.dicebear.com/8.x/adventurer-neutral/svg?seed=${seed}&backgroundColor=${bg}`;
    avatarDiv.innerHTML = `<img src="${avatarSrc}" alt="${p.name}" onerror="this.parentNode.textContent='${getInitials(p.name)}'">`;

    // Info
    const infoDiv = document.createElement("div");
    infoDiv.className = "card-info";
    infoDiv.innerHTML = `<div class="card-name">${p.name}</div>`;

    const countriesDiv = document.createElement("div");
    countriesDiv.className = "card-countries";
    (p.countries || []).forEach((c, ci) => {
      const tag = document.createElement("span");
      tag.className = `country-tag ct-${(i + ci) % 6}`;
      tag.innerHTML = `${getFlag(c)} ${c}`;
      countriesDiv.appendChild(tag);
    });
    infoDiv.appendChild(countriesDiv);

    card.appendChild(avatarDiv);
    card.appendChild(infoDiv);

    // Aðeins ef paid er "yes"
    if (p.paid === "yes") {
      const moneyBagDiv = document.createElement("div");
      moneyBagDiv.className = "money-bag";
      moneyBagDiv.textContent = "💰";
      card.appendChild(moneyBagDiv);
    }

    grid.appendChild(card);
  });
}

function render() {
  document.getElementById("main-title").textContent = config.title;
  document.getElementById("main-subtitle").textContent = config.subtitle;
  document.getElementById("pot-display").textContent =
    calcPot().toLocaleString("is-IS") + " kr.";

  const n = participants.length;
  const bets = participants.reduce((s, p) => s + (p.countries || []).length, 0);
  document.getElementById("count-label").textContent =
    n === 0 ? "Þátttakendur" : `${n} þátttakend${n === 1 ? "i" : "ur"} · ${bets} veð`;

  document.getElementById("footer-note").textContent = config.contactNote;

  updateCountdown();
  setInterval(updateCountdown, 60000);
  renderGrid();
}

render();
</script>
</body>
</html>
